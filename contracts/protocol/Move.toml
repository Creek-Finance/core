[package]
edition = "2024"
name = "Creek"
version = "0.0.1"


[dependencies]
# Use override = true to force all dependencies to use this Sui version
# This resolves conflicts with USDC/XAUM which use different Sui revisions
Sui = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/sui-framework", rev = "mainnet-v1.60.1", override = true}
MoveStdlib = { git = "https://github.com/MystenLabs/sui.git", subdir = "crates/sui-framework/packages/move-stdlib", rev = "mainnet-v1.60.1", override = true }
coin_gr = { local = "../coins/coin_gr" }
coin_gy = { local = "../coins/coin_gy" }
coin_gusd = { local = "../coins/coin_gusd" }
# Use lowercase xaum/usdc to match official mainnet package names
# For mainnet: git references to official repos with published-at
# For testnet/local: local vendor packages with test_mint support
xaum = { local = "../../contracts_other/vendor/xaum/packages/xaum"}
usdc = { git = "https://github.com/circlefin/stablecoin-sui.git", subdir = "packages/usdc", rev = "master" }
Math = { local = "../libs/math" }
X = { local = "../libs/x" }
CoinDecimalsRegistry = { local = "../libs/coin_decimals_registry" }
XOracle = { local = "../sui_x_oracle/x_oracle" }

[addresses]
protocol = "0x0"
xaum = "0x22aca8f8358ac1de0ae9f4a8da541480e1b5d5d0fc258d625014514672eb6c3f"